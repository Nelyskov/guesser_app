version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      DB_HOST:     172.18.0.2
      DB_PORT:     5432
      DB_NAME:     price_guesser
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "7000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "7001:3000"
    depends_on:
      - backend
    networks:
      - app_net

  parser:
    build:
      context: ./parser
    container_name: parser
    restart: "no"
    environment:
      DB_HOST:     172.18.0.2
      DB_PORT:     5432
      DB_NAME:     price_guesser
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
    networks:
      - app_net
    command: tail -f /dev/null

volumes:
  pg_data:

networks:
  app_net:
    driver: bridge